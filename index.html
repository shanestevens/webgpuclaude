<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn WebGPU with Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 1.25rem 1rem 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.75rem;
      background: linear-gradient(90deg, #00d2ff, #7a5cff, #ff6ec7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: #888; margin-top: 0.3rem; font-size: 0.9rem; }

    /* ── Tab bar ─────────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      justify-content: center;
      margin-top: 0.9rem;
    }
    .tab-bar button {
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: #777;
      font: 600 0.88rem 'Segoe UI', system-ui, sans-serif;
      padding: 0.45rem 1.5rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-bar button:hover  { color: #bbb; }
    .tab-bar button.active { color: #7a9fff; border-bottom-color: #7a9fff; }

    /* ── GPU warning ─────────────────────────────────────────────────────── */
    #gpu-warning {
      display: none;
      background: #442200;
      color: #ffaa44;
      text-align: center;
      padding: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* ── Examples tab ────────────────────────────────────────────────────── */
    #tab-examples { flex: 1; overflow-y: auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }
    .example-card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .example-card:hover { border-color: #5a5aff; }
    .card-header {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      background: #16161f;
      border-bottom: 1px solid #2a2a3a;
    }
    .card-number {
      font-size: 0.75rem;
      font-weight: 700;
      background: #5a5aff;
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .card-header h2 { font-size: 1rem; font-weight: 600; }
    .card-header p  { font-size: 0.8rem; color: #888; margin-left: auto; margin-right: 0.5rem; }
    .canvas-container { position: relative; width: 100%; height: 400px; }
    .canvas-container canvas { width: 100% !important; height: 100% !important; display: block; }

    /* ── Expand / fullscreen ─────────────────────────────────────────────── */
    .expand-btn {
      flex-shrink: 0;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: #1e1e30;
      border: 1px solid #3a3a55;
      border-radius: 6px;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1;
      padding: 0;
    }
    .expand-btn:hover { background: #2a2aaa; border-color: #7a7aff; color: #fff; }

    /* card in fullscreen mode */
    .example-card.is-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 600;
      border-radius: 0;
      border: none;
    }
    .example-card.is-fullscreen .card-header { display: none; }
    .example-card.is-fullscreen .canvas-container { height: 100dvh; }

    /* in fullscreen the header is hidden, so break the button out to fixed */
    .example-card.is-fullscreen .expand-btn {
      position: fixed;
      top: 12px; right: 12px;
      z-index: 610;
      background: rgba(10,10,20,0.75);
      border-color: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      width: 34px; height: 34px;
      font-size: 16px;
    }

    /* dim backdrop */
    #fs-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 599;
      background: rgba(0,0,0,0.88);
    }
    #fs-backdrop.active { display: block; }

    /* ── Designer tab ────────────────────────────────────────────────────── */
    /* flex:1 makes it a flex ITEM of body (fills remaining height).
       display:none is the default-hidden state; JS sets it to 'block' (not 'flex')
       so #designer-root is a normal block child and fills width/height naturally. */
    #tab-designer { flex: 1; display: none; overflow: hidden; }
    #designer-root { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* ── House Designer internals ────────────────────────────────────────── */
    .hd-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #161622;
      border-bottom: 1px solid #2a2a3a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .hd-group { display: flex; gap: 4px; align-items: center; }
    .hd-sep   { width: 1px; height: 22px; background: #2e2e44; margin: 0 4px; }

    .hd-btn {
      background: #1e1e30;
      border: 1px solid #3a3a55;
      color: #ccc;
      font: 13px 'Segoe UI', system-ui, sans-serif;
      padding: 4px 11px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .hd-btn:hover  { background: #2a2a44; color: #eee; border-color: #5a5aaa; }
    .hd-btn.active { background: #2244aa; color: #fff; border-color: #4466cc; }
    .hd-btn.danger { border-color: #5a2222; color: #cc8888; }
    .hd-btn.danger:hover { background: #3a1818; color: #ffaaaa; }

    .hd-count { font-size: 12px; color: #888; padding: 0 6px; }
    .hd-hint  { font-size: 11px; color: #444; margin-left: auto; }

    .hd-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .hd-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }

    .hd-pane-title {
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      background: #111118;
      border-bottom: 1px solid #222233;
      flex-shrink: 0;
    }
    .hd-pane-sub { font-weight: 400; color: #444; }

    /* 2D floor-plan canvas — flex item in its pane column */
    .hd-pane #fp-canvas {
      flex: 1;
      min-height: 0;
      display: block;
      width: 100%;
    }

    /* 3D preview container — flex item; fills its pane column */
    .hd-pane #preview3d {
      flex: 1;
      min-height: 0;
      display: block;
      position: relative;   /* anchor for the canvas inside */
      overflow: hidden;
    }

    /*
     * The Three.js WebGPU canvas is sized from CSS dimensions by Chrome's
     * compositor — NOT from the canvas.width/height attributes.
     * If the CSS size is 0×0 the swap chain is 0×0 → GPU errors.
     * Forcing 100%×100% here keeps the swap chain sized correctly at all times.
     */
    #preview3d canvas {
      width:   100% !important;
      height:  100% !important;
      display: block;
    }

    .hd-divider {
      width: 4px;
      background: #13131e;
      border-left:  1px solid #222233;
      border-right: 1px solid #222233;
      flex-shrink: 0;
    }

    /* ── Panels strip (Quick Add Rooms + Properties) ─────────────────────── */
    .hd-panels {
      display: flex;
      align-items: stretch;
      background: #0e0e18;
      border-bottom: 1px solid #2a2a3a;
      flex-shrink: 0;
      max-height: 148px;
      overflow: hidden;
    }
    .hd-panel {
      flex: 1;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
    }
    .hd-panel-props { flex: 2; }
    .hd-panel-title {
      font: 700 10px 'Segoe UI', system-ui, sans-serif;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .hd-panel-vsep {
      width: 1px;
      background: #2a2a3a;
      flex-shrink: 0;
      margin: 6px 0;
    }

    /* Room preset buttons */
    .hd-rooms { display: flex; gap: 8px; flex-wrap: wrap; }
    .hd-room-btn {
      background: #161622;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #ccc;
      cursor: pointer;
      padding: 6px 14px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      min-width: 90px;
    }
    .hd-room-btn:hover { background: #1e1e30; border-color: #5a5aaa; }
    .hd-room-name { display: block; font: 600 13px 'Segoe UI', system-ui, sans-serif; color: #e0e0e0; }
    .hd-room-dim  { display: block; font: 400 11px 'Segoe UI', system-ui, sans-serif; color: #555; margin-top: 2px; }

    /* Properties panel */
    .hd-props-hint { font-size: 12px; color: #444; }
    #hd-props-form { display: flex; flex-direction: column; gap: 5px; }
    .hd-prop-label-row { display: flex; align-items: center; gap: 8px; }
    .hd-props-grid { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
    .hd-prop-col { display: flex; flex-direction: column; gap: 2px; }
    .hd-prop-lbl {
      font: 600 11px 'Segoe UI', system-ui, sans-serif;
      color: #777;
      white-space: nowrap;
    }
    .hd-prop-input {
      background: #161622;
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      color: #e0e0e0;
      font: 13px 'Segoe UI', system-ui, sans-serif;
      padding: 3px 7px;
      outline: none;
      transition: border-color 0.15s;
    }
    .hd-prop-input:focus { border-color: #5a5aaa; }
    .hd-prop-input:disabled { opacity: 0.35; cursor: not-allowed; }
    .hd-prop-input[type="number"] { width: 68px; }
    .hd-prop-text { width: 150px; }
  </style>
</head>
<body>
  <div id="fs-backdrop"></div>
  <div id="gpu-warning">⚠ WebGPU is not available in this browser. Please use Chrome 113+ or Edge 113+.</div>
  <header>
    <h1>Learn WebGPU with Three.js</h1>
    <p>Interactive examples from basic triangles to advanced effects — each box has orbit controls</p>
    <div class="tab-bar">
      <button id="tab-btn-examples" class="active">WebGPU Examples</button>
      <button id="tab-btn-designer">House Designer</button>
    </div>
  </header>

  <div id="tab-examples">
    <div class="grid" id="grid"></div>
  </div>

  <div id="tab-designer">
    <div id="designer-root"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
